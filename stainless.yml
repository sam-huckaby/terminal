# yaml-language-server: $schema=https://app.stainlessapi.com/config.schema.json

organization:
  name: terminal
  docs: https://terminal.shop/docs
  contact: dev@terminal.com
openapi:
  code_samples: x-codeSamples
resources:
  product:
    models:
      product: Product
      productVariant: ProductVariant
    methods:
      list: get /product
      get: get /product/{id}
  profile:
    models:
      profile: Profile
    methods:
      me: get /profile
      update: put /profile
  address:
    models:
      address: Address
    methods:
      list: get /address
      get: get /address/{id}
      create: post /address
      delete: delete /address/{id}
  card:
    models:
      card: Card
    methods:
      list: get /card
      get: get /card/{id}
      create: post /card
      collect: post /card/collect
      delete: delete /card/{id}
  cart:
    models:
      cart: Cart
    methods:
      get: get /cart
      clear: delete /cart
      setItem: put /cart/item
      setAddress: put /cart/address
      setCard: put /cart/card
      convert: post /cart/convert
  order:
    models:
      order: Order
    methods:
      list: get /order
      get: get /order/{id}
      create: post /order
  subscription:
    models:
      subscription: Subscription
    methods:
      list: get /subscription
      get: get /subscription/{id}
      create: post /subscription
      delete: delete /subscription/{id}
  token:
    models:
      token: Token
    methods:
      list: get /token
      get: get /token/{id}
      create: post /token
      delete: delete /token/{id}
  app:
    models:
      app: App
    methods:
      list: get /app
      get: get /app/{id}
      create: post /app
      delete: delete /app/{id}
  email:
    methods:
      create: post /email
  view:
    models:
      app: App
    methods:
      init: get /view/init
settings:
  license: Apache-2.0
client_settings:
  opts:
    bearer_token:
      type: string
      auth:
        security_scheme: Bearer
      read_env: TERMINAL_BEARER_TOKEN
    app_id:
      type: string
      nullable: true
      send_in_header: "x-terminal-app-id"
environments:
  production: https://api.terminal.shop/
  dev: https://api.dev.terminal.shop/
query_settings:
  nested_format: brackets
  array_format: comma
readme:
  example_requests:
    default:
      type: request
      endpoint: get /product
      params: &ref_0 {}
    headline:
      type: request
      endpoint: get /product
      params: *ref_0
targets:
  node:
    package_name: "@terminaldotshop/sdk"
    production_repo: terminaldotshop/terminal-sdk-js
    publish:
      npm: true
    skip: false
  go:
    package_name: terminal
    production_repo: terminaldotshop/terminal-sdk-go
    skip: false
  python:
    project_name: terminal-shop
    package_name: terminal_shop
    production_repo: terminaldotshop/terminal-sdk-python
    publish:
      pypi: true
    skip: false
  java:
    reverse_domain: shop.terminal.api
    production_repo: terminaldotshop/terminal-sdk-java
    publish:
      maven:
        sonatype_platform: portal
    skip: false
  kotlin:
    reverse_domain: shop.terminal.api
    production_repo: terminaldotshop/terminal-sdk-kotlin
    publish:
      maven:
        sonatype_platform: portal
    skip: false
  ruby:
    gem_name: terminal-shop
    production_repo: terminaldotshop/terminal-sdk-ruby
    publish:
      rubygems: true
    skip: false
  terraform:
    provider_name: terminal
    production_repo: terminaldotshop/terraform-provider-terminal
    publish:
      hashicorp_registry: false
    options:
      infer_all_services: true
    skip: false
